<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠SEARCH GOD🧠</title>
<style>
body { 
   display: flex; 
   position: fixed; 
   background: #000; 
   align-items: center; 
   justify-content: center; 
   width: 100%; 
   height: 100%; 
   margin: 0; 
}
#I { 
   color: gold; 
   height: 5vh; 
   margin: 8vh 10px; 
   background: blue; 
   font-weight: bold; 
   border-radius: 20px; 
   border: 2px solid gray; 
   box-shadow: 0px 0px 30px orange; 
   padding: 0 15px;
   outline: none;
}
#F { 
   width: 100%; 
   height: 80vh; 
   margin-top: 5vh; 
   background: url(https://is.gd/5gxHfl);
   background-size: 100% 100%;
   background-position: center;
}
#Btn {
    cursor: pointer;
    background: #555;
    color: #fff;
    font-weight: bold;
    border: 1px solid #aaa;
    border-radius: 10px;
    padding: 8px 15px;
    scale: 80%;
}
.serie { 
    background: red !important;
}
</style>
</head>
<body>
<center> 
    <input id="I" placeholder="Buscar..." type="text" autofocus/>      
    
    <button id="Btn" onclick="this.classList.toggle('serie'); this.innerText = this.classList.contains('serie') ? 'SERIE' : 'PELÍCULA'; I.focus();">PELÍCULA</button>

    <iframe id="F" src="" frameborder="0" allowfullscreen="true" allow="encrypted-media"></iframe>
</center>

<script>
document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
            var Tipo = Btn.classList.contains('serie') ? "serie" : "pelicula";
        
            var query = I.value.trim().toLowerCase();
                
     var URL = "https://sololatino.net/" + Tipo + "/" + query;
            
   window.location.href = URL; 
         I.value = '';       
    }
});
</script>
</body>
</html>
