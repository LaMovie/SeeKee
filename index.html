<!DOCTYPE HTML>
<html lang="es">
<head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>Chatbot de Libros</title>
   <style>
      body {
          background: #000;
          font-family: sans-serif;
      }
      #All {
          gap: 10px;
          width: 95%;
          height: 75vh;
          display: flex;
          flex-direction: column;
          overflow-y: auto;  
          position: fixed;  
          padding: 10px;
      }
      ul {
          padding: 0;
          display: flex;
          flex-direction: column;
      }
      ul li {    
          width: 75%; 
          margin-top: 2vh;
          padding: 15px;
          list-style: none;
          font-weight: bold;
          border-radius: 20px;
          line-height: 1.4;
      }
      /* Burbuja del Bot */
      ul li.bot-msg {
          color: #000;
          background: gold;
          align-self: flex-start;
          border-bottom-left-radius: 2px;
      }
      /* Burbuja del Usuario */
      ul li.user-msg {
          color: #fff;
          background: blue;
          align-self: flex-end;
          border-bottom-right-radius: 2px;
      }
      #Input {
          z-index: 10;
          color: #000;
          width: 80%;
          padding: 2vh;
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: gold;
          font-weight: bold;
          border-radius: 20px;
          border: none;
          outline: none;
      }
   </style>
</head>
<body>

<div id="All">
    <ul id="Lista">
        <li class="bot-msg">¡Hola! Pregúntame lo que quieras sobre los libros cargados.</li>
    </ul>
</div>

<input type="text" id="Input" placeholder="Escribe tu pregunta aquí..." onkeypress="checkEnter(event)">

<script src="datos.js"></script>

<script>
    // Si datos.js no carga o no existe, evitamos errores
    if (typeof LIBROS === 'undefined') {
        var LIBROS = [];
        console.error("No se encontró datos.js. Asegúrate de generarlo en Termux.");
    }

    function checkEnter(event) {
        if (event.key === "Enter") {
            Responder();
        }
    }

    function Responder() {
        var inputElement = document.getElementById("Input");
        var textoUsuario = inputElement.value.trim();
        var lista = document.getElementById("Lista");

        if (textoUsuario === "") return;

        // 1. Mostrar mensaje del usuario
        var liUser = document.createElement("li");
        liUser.className = "user-msg";
        liUser.textContent = textoUsuario;
        lista.appendChild(liUser);

        // 2. Lógica de búsqueda en el "Array de Libros"
        var respuestaTexto = "Lo siento, no encontré información específica sobre eso en los documentos.";
        var mejorPuntaje = 0;
        var palabrasClave = textoUsuario.toLowerCase().split(/\s+/);

        LIBROS.forEach(pagina => {
            let puntos = 0;
            let contenidoPagina = pagina.c.toLowerCase();

            palabrasClave.forEach(palabra => {
                // Buscamos palabras de más de 3 letras para evitar artículos (el, la, de)
                if (palabra.length > 3 && contenidoPagina.includes(palabra)) {
                    puntos++;
                }
            });

            if (puntos > mejorPuntaje) {
                mejorPuntaje = puntos;
                respuestaTexto = pagina.c; // Guardamos el texto de la página con más coincidencias
            }
        });

        // 3. Mostrar respuesta del Bot
        var liBot = document.createElement("li");
        liBot.className = "bot-msg";
        liBot.textContent = mejorPuntaje > 0 ? respuestaTexto : respuestaTexto;
        lista.appendChild(liBot);

        // 4. Limpiar y hacer scroll
        inputElement.value = "";
        liBot.scrollIntoView({ behavior: "smooth" });

        // OPCIONAL: Voz (Speech Synthesis)
        var voz = new SpeechSynthesisUtterance(liBot.textContent);
        voz.lang = "es-ES";
        window.speechSynthesis.speak(voz);
    }
</script>

</body>
</html>
