<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Biblioteca Seekee</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-color: #e0e0e0;
            --accent-color: #00aaff;
            --secondary-text: #999;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px;
            background-color: var(--card-bg);
            text-align: center;
            border-bottom: 1px solid #222;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--accent-color); }

        #contenedor-principal {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .libro-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #222;
        }

        .libro-titulo {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: block;
        }

        .libro-contenido {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        /* Controles de Voz */
        .controles-voz {
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .btn-voz {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Barra de búsqueda */
        .search-container {
            padding: 12px;
            background-color: var(--card-bg);
            display: flex;
            gap: 8px;
            border-top: 1px solid #222;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
        }

        .btn-buscar {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .empty-state { text-align: center; color: var(--secondary-text); margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <h1 id="status">Biblioteca Seekee</h1>
    </header>

    <div id="contenedor-principal">
        <div class="empty-state">Busca un tema para comenzar la lectura...</div>
    </div>

    <div class="search-container">
        <input type="text" id="inputBusqueda" placeholder="Buscar en biblioteca..." autocomplete="off">
        <button class="btn-buscar" onclick="ejecutarBusqueda()">Buscar</button>
    </div>

    <script src="datos.js"></script>

    <script>
        const vista = document.getElementById('contenedor-principal');
        const input = document.getElementById('inputBusqueda');
        const synth = window.speechSynthesis;
        let currentUtterance = null;

        function ejecutarBusqueda() {
            const termino = input.value.toLowerCase().trim();
            if (!termino) return;

            detenerVoz(); // Detener lectura previa al buscar

            const resultados = biblioteca.filter(libro => 
                libro.titulo.toLowerCase().includes(termino) || 
                libro.contenido.toLowerCase().includes(termino)
            );

            mostrarResultados(resultados);
            input.blur();
        }

        function mostrarResultados(lista) {
            vista.innerHTML = '';
            if (lista.length === 0) {
                vista.innerHTML = '<div class="empty-state">No se encontraron resultados.</div>';
                return;
            }

            lista.forEach((libro, index) => {
                const card = document.createElement('div');
                card.className = 'libro-card';
                card.innerHTML = `
                    <span class="libro-titulo">${libro.titulo}</span>
                    <div class="libro-contenido" id="texto-${index}">${libro.contenido}</div>
                    <div class="controles-voz">
                        <button class="btn-voz" onclick="leerTexto('${index}')">▶ Escuchar</button>
                        <button class="btn-voz" onclick="detenerVoz()">■ Detener</button>
                    </div>
                `;
                vista.appendChild(card);
            });
            vista.scrollTop = 0;
        }

        function leerTexto(index) {
            detenerVoz();
            const texto = document.getElementById(`texto-${index}`).innerText;
            
            currentUtterance = new SpeechSynthesisUtterance(texto);
            currentUtterance.lang = 'es-ES';
            currentUtterance.rate = 1.0; 

            currentUtterance.onstart = () => document.getElementById('status').innerText = "Leyendo...";
            currentUtterance.onend = () => document.getElementById('status').innerText = "Biblioteca Seekee";
            
            synth.speak(currentUtterance);
        }

        function detenerVoz() {
            if (synth.speaking) {
                synth.cancel();
                document.getElementById('status').innerText = "Biblioteca Seekee";
            }
        }

        // Enter para buscar
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') ejecutarBusqueda(); });
    </script>
</body>
</html>
