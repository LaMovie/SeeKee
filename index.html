<!DOCTYPE HTML>
<html lang="es">
<head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>HPN DATA - Kybalion</title>
   <style>
      body { background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
      
      /* Contenedor de mensajes */
      #All { 
          width: 100%; 
          height: 80vh; 
          display: flex; 
          flex-direction: column; 
          overflow-y: auto; 
          padding: 10px;
          box-sizing: border-box;
      }

      ul { padding: 0; list-style: none; display: flex; flex-direction: column; }
      
      ul li { 
          max-width: 80%; 
          margin-bottom: 15px; 
          padding: 15px; 
          border-radius: 15px; 
          font-size: 16px; 
          line-height: 1.4; 
          word-wrap: break-word;
      }

      /* Estilo Bot (Oro) */
      .bot-msg { 
          background: #FFD700; 
          color: #000; 
          align-self: flex-start; 
          border-bottom-left-radius: 2px;
          box-shadow: 2px 2px 10px rgba(255, 215, 0, 0.2);
      }

      /* Estilo Usuario (Azul) */
      .user-msg { 
          background: #007BFF; 
          color: #fff; 
          align-self: flex-end; 
          border-bottom-right-radius: 2px;
      }

      /* Input fijo abajo */
      #Input { 
          width: 90%; 
          padding: 15px; 
          position: fixed; 
          bottom: 15px; 
          left: 50%; 
          transform: translateX(-50%); 
          background: #FFD700; 
          border-radius: 30px; 
          border: none; 
          font-weight: bold; 
          font-size: 16px;
          outline: none;
      }

      #status {
          font-size: 12px;
          text-align: center;
          padding: 5px;
          color: #555;
      }
   </style>
</head>
<body>

<div id="All">
    <div id="status">Verificando datos...</div>
    <ul id="Lista">
        <li class="bot-msg">Soy HPN DATA. He leído El Kybalión. ¿Qué quieres consultar?</li>
    </ul>
</div>

<input type="text" id="Input" placeholder="Escribe tu pregunta..." onkeypress="checkEnter(event)">

<script src="datos.js"></script>

<script>
    const statusDiv = document.getElementById("status");
    const lista = document.getElementById("Lista");
    const chatContainer = document.getElementById("All");

    // Verificar si LIBROS cargó
    if (typeof LIBROS !== 'undefined') {
        statusDiv.innerHTML = "✅ Base de Datos: " + LIBROS.length + " páginas listas.";
        statusDiv.style.color = "#4CAF50";
    } else {
        statusDiv.innerHTML = "❌ Error: No se encuentra datos.js";
        statusDiv.style.color = "#F44336";
    }

    function checkEnter(event) {
        if (event.key === "Enter") Responder();
    }

    function Responder() {
        const input = document.getElementById("Input");
        const prompt = input.value.trim();
        if (!prompt) return;

        // 1. Mostrar mensaje usuario
        const liUser = document.createElement("li");
        liUser.className = "user-msg";
        liUser.textContent = prompt;
        lista.appendChild(liUser);
        
        input.value = ""; // Limpiar input

        // 2. BUSCADOR MEJORADO
        let mejorRespuesta = "No encontré ese tema en el libro. Intenta con palabras como: mente, vibración, ritmo o causa.";
        let mayorPuntaje = 0;
        
        // Limpiamos la pregunta: minúsculas y solo palabras importantes
        const palabrasBusqueda = prompt.toLowerCase().replace(/[?,.!]/g, "").split(/\s+/).filter(w => w.length > 3);

        LIBROS.forEach(pagina => {
            let puntos = 0;
            // Limpiamos el texto de la página para que la búsqueda sea fácil
            let textoPagina = pagina.c.toLowerCase().replace(/\s+/g, " ");

            palabrasBusqueda.forEach(palabra => {
                if (textoPagina.includes(palabra)) {
                    puntos += 10; // Punto por coincidencia exacta
                }
            });

            if (puntos > mayorPuntaje) {
                mayorPuntaje = puntos;
                mejorRespuesta = `(Pág. ${pagina.p}): ${pagina.c}`;
            }
        });

        // 3. Mostrar respuesta del Bot
        setTimeout(() => {
            const liBot = document.createElement("li");
            liBot.className = "bot-msg";
            liBot.textContent = mejorRespuesta;
            lista.appendChild(liBot);
            
            // Scroll automático
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Voz
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(mejorRespuesta);
            utterance.lang = 'es-ES';
            synth.speak(utterance);
        }, 500);
    }
</script>

</body>
</html>
