<!DOCTYPE HTML>
<html lang="es">
<head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>HPN DATA - Inteligencia de Inventario</title>
   <style>
      body { background: #000; font-family: sans-serif; margin: 0; overflow: hidden; }
      #All { width: 100%; height: 80vh; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; box-sizing: border-box; }
      ul { padding: 0; list-style: none; display: flex; flex-direction: column; }
      ul li { max-width: 85%; margin-bottom: 15px; padding: 15px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
      
      /* Estilo Bot (Oro) */
      .bot-msg { background: #FFD700; color: #000; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 2px 2px 10px rgba(255, 215, 0, 0.3); }
      
      /* Estilo Usuario (Azul) */
      .user-msg { background: #007BFF; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
      
      #Input { width: 90%; padding: 18px; position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #FFD700; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; outline: none; }
      #status { font-size: 10px; text-align: center; color: #444; margin-top: 5px; }
   </style>
</head>
<body>

<div id="All">
    <div id="status">CHAT SEEKEE</div>
    <ul id="Lista">
        <li class="bot-msg">Soy SeeKee! ¿Sobre qué quieres consultar?</li>
    </ul>
</div>

<input type="text" id="Input" placeholder="Escribe tu consulta aquí..." onkeypress="checkEnter(event)">

<script src="datos.js"></script>

<script>
        const lista = document.getElementById("Lista");
    const chatContainer = document.getElementById("All");

    function checkEnter(event) { if (event.key === "Enter") Responder(); }

    function hablar(texto) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        synth.speak(utterance);
        return utterance; // Devolvemos el objeto para detectar cuando termine
    }

    function crearMensajeBot(texto) {
        const liBot = document.createElement("li");
        liBot.className = "bot-msg";
        liBot.textContent = texto;
        lista.appendChild(liBot);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function Responder() {
        const input = document.getElementById("Input");
        const prompt = input.value.trim();
        if (!prompt || typeof LIBROS === 'undefined') return;

        const liUser = document.createElement("li");
        liUser.className = "user-msg";
        liUser.textContent = prompt;
        lista.appendChild(liUser);
        input.value = "";

        let mejorRespuesta = "No encontré registros que coincidan con esa búsqueda.";
        let mayorPuntaje = 0;
        const palabrasBusqueda = prompt.toLowerCase().split(/\s+/).filter(w => w.length > 3);

        LIBROS.forEach(pagina => {
            let textoPagina = pagina.c.toLowerCase();
            let puntos = 0;
            palabrasBusqueda.forEach(palabra => { if (textoPagina.includes(palabra)) puntos += 10; });
            if (puntos > mayorPuntaje) {
                mayorPuntaje = puntos;
                mejorRespuesta = "(Pág. " + pagina.p + "): " + pagina.c;
            }
        });

        setTimeout(() => {
            window.speechSynthesis.cancel();
            
            // Dividir el texto en dos fragmentos según tu regla
            const bloque1 = mejorRespuesta.substring(0, 1000);
            const bloque2 = mejorRespuesta.substring(1000, 3400);

            // Ejecutar Bloque 1
            crearMensajeBot(bloque1);
            const v1 = hablar(bloque1);

            // Cuando termine el Bloque 1, si hay Bloque 2, lo lanza
            v1.onend = () => {
                if (bloque2) {
                    crearMensajeBot(bloque2);
                    hablar(bloque2);
                }
            };
        }, 300);
    }
</script>
</body>
</html>
