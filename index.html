<!DOCTYPE HTML>
<html lang="es">
<head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>SEEKEE</title>
   <style>
      body { background: #000; font-family: sans-serif; margin: 0; overflow: hidden; }
      #All { width: 100%; height: 80vh; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; box-sizing: border-box; }
      ul { padding: 0; list-style: none; display: flex; flex-direction: column; }
      ul li { max-width: 85%; margin-bottom: 15px; padding: 15px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
      
      /* Estilo Bot (Oro) */
      .bot-msg { background: #FFD700; color: #000; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 2px 2px 10px rgba(255, 215, 0, 0.3); }
      
      /* Estilo Usuario (Azul) */
      .user-msg { background: #007BFF; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
      
      #Input { width: 90%; padding: 18px; position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #FFD700; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; outline: none; }
      #status { font-size: 10px; text-align: center; color: #444; margin-top: 5px; }
   </style>
</head>
<body>

<div id="All">
    <div id="status">CHAT SEEKEE</div>
    <ul id="Lista">
        <li class="bot-msg">Soy Sofía! ¿Sobre qué quieres consultar?</li>
    </ul>
</div>

<input type="text" id="Input" placeholder="Escribe tu consulta aquí..." onkeypress="checkEnter(event)">

<script src="datos.js"></script>

<script>
       const lista = document.getElementById("Lista");
    const chatContainer = document.getElementById("All");
    let ultimoTema = null; 
    let paginasLeidas = new Set(); 

    const SALUDOS = ["hola", "buenos dias", "buenas tardes", "que tal", "como estas", "saludos"];
    const ARGUMENTO = ["mas", "argumenta", "argumentalo", "dime mas", "explicame", "explicamelo", "interesa", "sigue", "continua", "detalles", "cuentame mas"];

    function limpiarTexto(t) {
        return t.toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "");
    }

    function hablar(texto) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        synth.speak(utterance);
        return utterance;
    }

    function crearMensajeBot(texto) {
        const liBot = document.createElement("li");
        liBot.className = "bot-msg";
        liBot.textContent = texto;
        lista.appendChild(liBot);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function crearMensajeUsuario(t) {
        const li = document.createElement("li");
        li.className = "user-msg";
        li.textContent = t;
        lista.appendChild(li);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function checkEnter(event) { 
        if (event.key === "Enter") {
            event.preventDefault(); // Evita recarga de página
            Responder(); 
        }
    }

    function Responder() {
        const input = document.getElementById("Input");
        const originalPrompt = input.value.trim();
        if (!originalPrompt) return;

        const promptLimpio = limpiarTexto(originalPrompt);
        crearMensajeUsuario(originalPrompt);
        input.value = "";

        let mejorRespuesta = "";
        let mayorPuntaje = 0;
        let candidatoSeleccionado = null;

        if (SALUDOS.some(s => promptLimpio.includes(s))) {
            mejorRespuesta = "¡Hola! Soy SeeKee. ¿En qué puedo ayudarte hoy?";
        } else {
            const esArgumento = ARGUMENTO.some(arg => promptLimpio.includes(arg));
            const palabrasBusqueda = promptLimpio.split(/\s+/).filter(w => w.length > 3);

            LIBROS.forEach((pagina, index) => {
                if (esArgumento && paginasLeidas.has(index)) return;
                let textoPagina = limpiarTexto(pagina.c);
                let tituloLibro = pagina.t ? limpiarTexto(pagina.t) : "";
                let puntos = 0;

                if (esArgumento && ultimoTema && pagina.t === ultimoTema.t) puntos += 25;

                palabrasBusqueda.forEach(palabra => {
                    if (textoPagina.includes(palabra)) puntos += 10;
                    if (tituloLibro.includes(palabra)) puntos += 50;
                });

                if (puntos > mayorPuntaje) {
                    mayorPuntaje = puntos;
                    candidatoSeleccionado = { pagina, index };
                }
            });

            if (candidatoSeleccionado) {
                const { pagina, index } = candidatoSeleccionado;
                paginasLeidas.add(index);
                ultimoTema = pagina;
                mejorRespuesta = `(Libro: ${pagina.t} - Pág. ${pagina.p}): ${pagina.c}`;
            } else {
                mejorRespuesta = esArgumento ? "No hay más información nueva sobre eso." : "No encontré registros que coincidan.";
            }
        }

        setTimeout(() => {
            window.speechSynthesis.cancel();
            const b1 = mejorRespuesta.substring(0, 1000);
            const b2 = mejorRespuesta.substring(1000, 3400);
            crearMensajeBot(b1);
            const v1 = hablar(b1);
            v1.onend = () => { if (b2) { crearMensajeBot(b2); hablar(b2); } };
        }, 300);
    }
</script>
</body>
</html>
