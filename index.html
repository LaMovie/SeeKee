<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seekee Chat</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mensaje {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background-color: #005c4b;
            color: #e9edef;
            border-bottom-right-radius: 2px;
        }

        .bot {
            align-self: flex-start;
            background-color: #202c33;
            color: #e9edef;
            border-bottom-left-radius: 2px;
        }

        #input-area {
            background-color: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 25px;
            outline: none;
        }

        button {
            background: none;
            border: none;
            color: #00aaff;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 15px;
        }

        .status { font-size: 12px; color: #8696a0; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="status" id="db-status">Iniciando...</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Escribe un mensaje..." autocomplete="off">
    <button onclick="enviarMensaje()">Enviar</button>
</div>

<script src="datos.js"></script>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const dbStatus = document.getElementById('db-status');
    const synth = window.speechSynthesis;
    
    let LIBROS = [];

    // --- CARGA Y ACTUALIZACIÓN (Invisible y funcional) ---
    async function cargarBiblioteca() {
        const local = localStorage.getItem('seekee_db');
        if (local) {
            LIBROS = JSON.parse(local);
            dbStatus.innerText = "Biblioteca actualizada";
        } else if (typeof biblioteca !== 'undefined') {
            LIBROS = biblioteca;
            dbStatus.innerText = "Modo Local";
        }

        if (navigator.onLine) {
            try {
                const res = await fetch("https://lamovie.github.io/SeeKee/datos.js");
                const texto = await res.text();
                const json = texto.substring(texto.indexOf('['), texto.lastIndexOf(']') + 1);
                localStorage.setItem('seekee_db', json);
            } catch (e) { console.log("Offline update skip"); }
        }
    }

    function agregarMensaje(texto, tipo) {
        const div = document.createElement('div');
        div.className = `mensaje ${tipo}`;
        div.innerText = texto;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        
        if (tipo === 'bot') {
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-ES';
            synth.speak(utterance);
        }
    }

    function enviarMensaje() {
        const msn = userInput.value.trim();
        if (!msn) return;

        agregarMensaje(msn, 'user');
        userInput.value = '';

        setTimeout(() => procesarRespuesta(msn.toLowerCase()), 500);
    }

    function procesarRespuesta(msn) {
        // 1. Saludos
        if (msn.includes("hola") || msn.includes("buenos dias")) {
            agregarMensaje("¡Hola! Soy Seekee. ¿Qué misterio quieres investigar hoy?", 'bot');
            return;
        }

        // 2. Búsqueda de información (Mejorada para "Qué es el mundo espiritual")
        // Buscamos palabras clave ignorando conectores cortos
        const palabrasClave = msn.split(' ').filter(p => p.length > 3);
        
        let resultado = LIBROS.find(l => 
            msn.includes(l.titulo.toLowerCase()) || 
            palabrasClave.some(p => l.contenido.toLowerCase().includes(p))
        );

        if (resultado) {
            // Si el contenido es muy largo, mandamos un fragmento para no saturar el chat
            const extracto = resultado.contenido.length > 500 ? 
                             resultado.contenido.substring(0, 500) + "..." : 
                             resultado.contenido;
            agregarMensaje(`${resultado.titulo}:\n\n${extracto}`, 'bot');
        } else {
            agregarMensaje("No encontré información exacta sobre eso en mis registros actuales, pero sigo aprendiendo.", 'bot');
        }
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensaje(); });
    
    cargarBiblioteca();
</script>

</body>
</html>
